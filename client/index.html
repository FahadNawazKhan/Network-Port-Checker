<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Port Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="card">
            <h1>Network Port Checker</h1>

            <input type="text" id="ip" placeholder="Enter IP address:" required/>
            <input type="number" id="port" placeholder="Enter port:" required />

            <button id="btn">Check Port</button>

            <div class="result">
                <p id="status">Status: —</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
